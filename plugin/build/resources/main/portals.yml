# The portal type used by /islandportal give when no better fallback exists.
default-portal-type: spawn

# Available access policy values:
# OWNER          - only the player who placed/owns this portal
# ISLAND_OWNER   - currently treated as the stored island owner
# ISLAND_MEMBERS - owner and stored island members
# ANYONE         - every player, still limited by permission nodes below
#
# Permission fields are optional. Leave a field empty to skip that permission check.
# When a permission is set, the player must have it before the policy is checked.
portal-types:
  spawn:
    # The item players receive and place. This supports configurable item meta.
    item:
      material: NETHER_STAR
      display-name: "<aqua>Spawn Portal"
      lore:
        - "<gray>Place this on your island."
        - "<dark_gray>Shift right-click to configure."
        - "<dark_gray>Shift left-click to pick up."
      custom-model-data: 0
      unbreakable: false
      enchantment-glint: true
      item-flags:
        - HIDE_ATTRIBUTES
        - HIDE_UNBREAKABLE

    # Portal frame and trigger area. width/height are the inside portal size.
    portal:
      width: 2
      height: 3
      frame-material: OBSIDIAN
      portal-material: NETHER_PORTAL
      replace-only-air: false
      # false: plugin builds frame and portal blocks after the island schematic is pasted.
      # true: schematic already contains the exact custom frame and portal blocks; plugin only tracks the area.
      # When true, all schematic support blocks matching portal-material are also tracked as triggers,
      # so NETHER_PORTAL blocks inside the schematic run this custom portal instead of vanilla Nether travel.
      track-only: false

    # Base offset from the skyblock island location when portal-island is disabled
    # or before random portal-island distance is added.
    island-offset:
      x: 16
      y: 0
      z: 0

    # Fallback direction for default portals when random-facing is false.
    island-facing: SOUTH

    # Creates a small separate island for the default portal.
    # The placer scans nearby locations and only uses an area that is fully clear,
    # which helps avoid overlapping schematics that already contain side islands.
    portal-island:
      enabled: true
      # PLATFORM builds the simple generated island below.
      # SCHEMATIC pastes a WorldEdit/FAWE schematic from the plugin data folder,
      # then creates and tracks the managed portal at portal-offset.
      mode: SCHEMATIC
      # Put your own schematic under plugins/IslandPortal/schematics and point this path to it.
      # Example: "schematics/my_custom_portal_island.schem"
      # Bundled track-only sample: "schematics/track_only_portal_island.schem"
      # For that sample use portal.track-only: true, portal-offset x: 6 y: 5 z: 3,
      # and vertical-align.schematic-anchor-y: 4.
      schematic: "schematics/spawn_portal_island.schem"
      schematic-ignore-air: true
      # Aligns a chosen Y level inside the schematic with the main island Y.
      # Use this when a custom schematic was copied from its bottom or from a high origin
      # and appears above or below the normal island.
      vertical-align:
        enabled: true
        # Relative Y inside the schematic that should become level with the island location.
        # If the schematic was copied with its walking surface at the origin, keep 0.
        # If the schematic origin is at the bottom and the surface is 8 blocks above it, set 8.
        schematic-anchor-y: 0
        # Extra final adjustment after alignment. Negative lowers the portal island.
        y-offset: 0
      # PLATFORM mode options. These are also used as fallback when SCHEMATIC
      # cannot run because WorldEdit/FAWE is missing or the file is invalid.
      platform-radius: 4
      dirt-depth: 3
      top-material: GRASS_BLOCK
      fill-material: DIRT
      # Offset from the generated platform center or schematic paste origin to
      # the lower-left base block of the managed portal frame.
      portal-offset:
        x: 3
        y: 4
        z: 4
      # Adds a random radial offset to island-offset before scanning candidates.
      random-distance:
        min: 0
        max: 0
      random-facing: false
      # The scan walks outward from the origin by search-step blocks until
      # search-radius is reached. Set both random-distance values to 0 and
      # search-radius to 0 for an exact custom schematic placement.
      search-radius: 48
      search-step: 6
      clearance: 3

    # If true, this portal type is automatically created for newly created islands.
    default-on-island: true

    # If true, placing this portal consumes one item unless the player is in creative.
    consume-on-place: true

    # If true, picking up or admin-removing this portal can return its item.
    give-item-on-break: true

    # Default per-portal policies. Players can change them in the GUI if allowed.
    default-pickup-policy: ISLAND_MEMBERS
    default-use-policy: ISLAND_MEMBERS
    default-configure-policy: OWNER

    permissions:
      place: ""
      use: ""
      pickup: ""
      configure: ""

    # TELEPORT uses the target section. COMMANDS runs every command as console.
    # Command placeholders: %player%
    action:
      mode: TELEPORT
      target:
        world: world
        x: 0.5
        y: 100.0
        z: 0.5
        yaw: 0.0
        pitch: 0.0

  crates:
    item:
      material: ENDER_EYE
      display-name: "<gold>Crates Portal"
      lore:
        - "<gray>Fast teleport to crates."
      custom-model-data: 0
      unbreakable: false
      enchantment-glint: false
      item-flags: []
    portal:
      width: 2
      height: 3
      frame-material: CRYING_OBSIDIAN
      portal-material: NETHER_PORTAL
      replace-only-air: false
    island-offset:
      x: 6
      y: 0
      z: 0
    island-facing: SOUTH
    default-on-island: false
    consume-on-place: true
    give-item-on-break: true
    default-pickup-policy: OWNER
    default-use-policy: ISLAND_MEMBERS
    default-configure-policy: OWNER
    permissions:
      place: "islandportal.portal.crates.place"
      use: "islandportal.portal.crates.use"
      pickup: "islandportal.portal.crates.pickup"
      configure: "islandportal.portal.crates.configure"
    action:
      mode: COMMANDS
      commands:
        - "warp crates %player%"
